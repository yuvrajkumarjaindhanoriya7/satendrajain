<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satendra Jain - Portfolio</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .glass-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: 1px;
            background: linear-gradient(to right, #ffffff, #ece9e6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1rem;
            color: #b0bec5;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        hr {
            border: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
            margin: 20px 0;
        }

        h2 {
            font-size: 1.4rem;
            color: #e0e0e0;
            margin-bottom: 15px;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0 0 30px 0;
        }

        li {
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 10px;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 1.1rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.2s;
        }

        li:hover {
            transform: translateX(5px);
            background: rgba(255, 255, 255, 0.08);
        }

        .btn-container {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 150px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            text-align: center;
            border-radius: 12px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .btn-email {
            background: rgba(0, 123, 255, 0.25);
            color: #fff;
            border: 1px solid rgba(0, 123, 255, 0.4);
        }

        .btn-email:hover {
            background: rgba(0, 123, 255, 0.4);
            box-shadow: 0 0 15px rgba(0, 123, 255, 0.4);
        }

        .btn-call {
            background: rgba(40, 167, 69, 0.25);
            color: #fff;
            border: 1px solid rgba(40, 167, 69, 0.4);
        }

        .btn-call:hover {
            background: rgba(40, 167, 69, 0.4);
            box-shadow: 0 0 15px rgba(40, 167, 69, 0.4);
        }
    </style>
</head>
<body>

    <div class="glass-container">
        <header>
            <h1>Satendra Jain</h1>
            <p class="subtitle">Portfolio</p>
        </header>

        <hr>

        <section>
            <h2>Experience</h2>
            <ul>
                <li>ICICI Bank</li>
                <li>IIFL Bank</li>
                <li>Capri Gold Loan</li>
                <li>Bajaj Finance</li>
            </ul>
        </section>

        <hr>

        <section>
            <div class="btn-container">
                <a href="mailto:satyendrajain34@gmail.com" class="btn btn-email">Click to Email</a>
                <a href="tel:+919009503364" class="btn btn-call">Click to Call</a>
            </div>
        </section>
    </div>

</body>
</html>
